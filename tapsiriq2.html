<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Məhsullar Grid</title>
    <style>
        body {
            background-color: #dcdcdc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1000px;
            width: 100%;
        }

        .card {
            background-color: #ffffff;
            border: 1px solid #ccc;
            padding: 10px;
            box-sizing: border-box;
        }

        .image-container {
            position: relative;
            width: 100%;
            height: 180px;
            background-color: #eee;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .click-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background-color: #ff2211;
            color: white;
            border: none;
            padding: 5px 12px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }

        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .title {
            font-weight: bold;
            font-size: 14px;
            margin: 0;
        }

        .price {
            color: #2e7d32;
            font-weight: bold;
            font-size: 14px;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="card">
            <div class="image-container">
                <img src="https://picsum.photos/id/10/300/200" alt="Məhsul 1">
                <button class="click-btn">Click</button>
            </div>
            <div class="info">
                <p class="title">Məhsul 1</p>
                <p class="price">10 AZN</p>
            </div>
        </div>

        <div class="card">
            <div class="image-container">
                <img src="https://picsum.photos/id/16/300/200" alt="Məhsul 2">
                <button class="click-btn">Click</button>
            </div>
            <div class="info">
                <p class="title">Məhsul 2</p>
                <p class="price">15 AZN</p>
            </div>
        </div>

        <div class="card">
            <div class="image-container">
                <img src="https://picsum.photos/id/29/300/200" alt="Məhsul 3">
                <button class="click-btn">Click</button>
            </div>
            <div class="info">
                <p class="title">Məhsul 3</p>
                <p class="price">20 AZN</p>
            </div>
        </div>

        <div class="card">
            <div class="image-container">
                <img src="https://picsum.photos/id/10/300/200" alt="Məhsul 1">
                <button class="click-btn">Click</button>
            </div>
            <div class="info">
                <p class="title">Məhsul 1</p>
                <p class="price">10 AZN</p>
            </div>
        </div>

        <div class="card">
            <div class="image-container">
                <img src="https://picsum.photos/id/16/300/200" alt="Məhsul 2">
                <button class="click-btn">Click</button>
            </div>
            <div class="info">
                <p class="title">Məhsul 2</p>
                <p class="price">15 AZN</p>
            </div>
        </div>

        <div class="card">
            <div class="image-container">
                <img src="https://picsum.photos/id/29/300/200" alt="Məhsul 3">
                <button class="click-btn">Click</button>
            </div>
            <div class="info">
                <p class="title">Məhsul 3</p>
                <p class="price">20 AZN</p>
            </div>
        </div>
    </div>

</body>
</html>
